<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 정리기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 0.5px solid #e0e0e0; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
  input[type="text"], input[type="date"] {
    width: 100%; height: 36px; padding: 0 10px; font-size: 13px;
    border: 0.5px solid #ddd; border-radius: 8px; background: #fff;
    color: #1a1a1a; font-family: inherit; outline: none;
  }
  input:focus { border-color: #999; }
  .meta-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
  textarea {
    width: 100%; min-height: 180px; resize: vertical; font-size: 14px;
    padding: 10px 12px; border-radius: 8px; border: 0.5px solid #ddd;
    background: #fff; color: #1a1a1a; font-family: inherit; line-height: 1.6; outline: none;
  }
  textarea:focus { border-color: #999; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; font-size: 14px; font-weight: 500; border-radius: 8px; border: 0.5px solid #ddd; background: #fff; color: #1a1a1a; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .btn:hover { background: #f5f5f3; }
  .btn:active { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-row { display: flex; gap: 8px; margin-top: 10px; }
  .header-info { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid #eee; }
  .chip { font-size: 12px; color: #888; }
  .copy-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: #888; cursor: pointer; border: 0.5px solid #ddd; border-radius: 8px; padding: 4px 10px; background: none; margin-top: 1rem; font-family: inherit; transition: background 0.15s; }
  .copy-btn:hover { background: #f5f5f3; }
  .spinner { width: 16px; height: 16px; border: 2px solid #ddd; border-top-color: #888; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading { display: none; align-items: center; gap: 8px; font-size: 13px; color: #888; padding: 1rem 0; }
  #output { display: none; }
  .result-pre { font-family: inherit; font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }
  .topic-block { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid #eee; }
  .topic-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .topic-num { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
  .sub-item { margin-left: 1rem; margin-bottom: 4px; font-size: 14px; line-height: 1.7; }
  .detail-item { margin-left: 2rem; margin-bottom: 3px; font-size: 13px; line-height: 1.7; color: #444; }
  .key-point { margin-left: 1rem; margin-top: 6px; padding: 6px 10px; background: #faf8f5; border-left: 3px solid #d4a574; font-size: 13px; line-height: 1.6; color: #333; border-radius: 0 6px 6px 0; }
  .summary-section { margin-bottom: 1.5rem; padding-bottom: 1.5rem; border-bottom: 0.5px solid #eee; }
  .section-label { font-size: 11px; font-weight: 500; color: #888; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .summary-text { font-size: 14px; line-height: 1.7; }
  .action-section { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 0.5px solid #eee; }
  .action-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 6px; font-size: 13px; }
  .action-task { flex: 1; }
  .action-owner { color: #888; white-space: nowrap; }
  .action-due { color: #888; white-space: nowrap; }
</style>
</head>
<body>
<div class="container">
  <h1>회의록 정리기</h1>

  <div class="card">
    <div class="meta-row">
      <div>
        <label>회의명</label>
        <input type="text" id="meeting-title" placeholder="예: 3분기 기획 회의">
      </div>
      <div>
        <label>일시</label>
        <input type="date" id="meeting-date">
      </div>
      <div>
        <label>참석자</label>
        <input type="text" id="meeting-attendees" placeholder="예: 민지, 지훈">
      </div>
    </div>
    <label>회의 내용</label>
    <textarea id="raw-minutes" placeholder="회의 내용을 붙여넣으세요. 날것의 메모, 대화록 등 어떤 형태도 OK."></textarea>
    <div class="btn-row">
      <button class="btn" id="summarize-btn" onclick="summarize()">✦ 회의록 정리하기</button>
      <button class="btn" id="reset-btn" onclick="reset()" style="display:none">↺ 다시 입력</button>
    </div>
  </div>

  <div id="loading"><div class="spinner"></div> 분석 중...</div>

  <div id="output">
    <div class="card" id="result-card">
      <div class="header-info" id="header-info"></div>
      <div id="result-body"></div>
      <button class="copy-btn" onclick="copyResult()">⎘ 전체 복사</button>
    </div>
  </div>
</div>

<script>
  document.getElementById('meeting-date').value = new Date().toISOString().split('T')[0];

  async function summarize() {
    const raw = document.getElementById('raw-minutes').value.trim();
    if (!raw) { alert('회의 내용을 입력해주세요.'); return; }

    const title = document.getElementById('meeting-title').value.trim();
    const date = document.getElementById('meeting-date').value;
    const attendees = document.getElementById('meeting-attendees').value.trim();

    document.getElementById('summarize-btn').disabled = true;
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('output').style.display = 'none';

    const metaPart = [
      title ? `회의명: ${title}` : '',
      date ? `일시: ${date}` : '',
      attendees ? `참석자: ${attendees}` : ''
    ].filter(Boolean).join('\n');

    const prompt = `너는 회의록 정리 전문가야. 다음 회의 내용을 주제별로 체계적으로 정리해줘.
반드시 JSON만 반환하고 마크다운 코드블록이나 다른 텍스트는 절대 포함하지 마.

${metaPart ? '【메타 정보】\n' + metaPart + '\n\n' : ''}【회의 내용】
${raw}

반환 형식 (JSON):
{
  "overview": "전체 회의 한줄 요약",
  "topics": [
    {
      "title": "주제명 (예: 마케팅 전략)",
      "sub_items": [
        {
          "label": "세부 항목명",
          "details": ["구체적 내용1", "구체적 내용2"],
          "key_point": "이 항목의 핵심 (한 문장)"
        }
      ]
    }
  ],
  "action_items": [
    {"task": "할일", "owner": "담당자 (없으면 빈 문자열)", "due": "기한 (없으면 빈 문자열)"}
  ],
  "next_steps": "후속 조치 또는 다음 회의 관련 사항 (없으면 빈 문자열)"
}

규칙:
- 회의 내용에서 주제를 추출해서 topics 배열로 나눠라
- 각 주제 안에서 세부 항목(sub_items)으로 분류하라
- 각 세부 항목에 구체적 내용(details)과 핵심(key_point)을 반드시 넣어라
- 결정된 할일은 action_items에 별도 정리하라
- 회의 내용에 없는 말을 절대 만들어내지 마라. 원문에 있는 내용만 정리하라
- 추측이나 해석을 더하지 말고, 있는 그대로만 정리하라`;

    try {
      const res = await fetch('/api/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderResult(data, { title, date, attendees });
    } catch(e) {
      alert('오류: ' + e.message);
      document.getElementById('summarize-btn').disabled = false;
    }
    document.getElementById('loading').style.display = 'none';
  }

  function renderResult(data, meta) {
    const headerEl = document.getElementById('header-info');
    const chips = [];
    if (meta.title) chips.push(`<span class="chip">📋 ${meta.title}</span>`);
    if (meta.date) chips.push(`<span class="chip">📅 ${meta.date}</span>`);
    if (meta.attendees) chips.push(`<span class="chip">👥 ${meta.attendees}</span>`);
    headerEl.innerHTML = chips.join('');
    if (!chips.length) headerEl.style.display = 'none';
    else headerEl.style.display = 'flex';

    const body = document.getElementById('result-body');
    let html = '';

    if (data.overview) {
      html += `<div class="summary-section">
        <p class="section-label">📌 한줄 요약</p>
        <p class="summary-text">${data.overview}</p>
      </div>`;
    }

    if (data.topics?.length) {
      data.topics.forEach((topic, i) => {
        html += `<div class="topic-block">`;
        html += `<div class="topic-num">📂 ${i + 1}. ${topic.title}</div>`;
        if (topic.sub_items?.length) {
          topic.sub_items.forEach((sub, j) => {
            html += `<div class="sub-item">${j + 1}) ${sub.label}</div>`;
            if (sub.details?.length) {
              sub.details.forEach((d, k) => {
                const circle = ['①','②','③','④','⑤','⑥','⑦','⑧','⑨','⑩'][k] || `${k+1}`;
                html += `<div class="detail-item">${circle} ${d}</div>`;
              });
            }
            if (sub.key_point) {
              html += `<div class="key-point">💡 핵심: ${sub.key_point}</div>`;
            }
          });
        }
        html += `</div>`;
      });
    }

    if (data.action_items?.length) {
      html += `<div class="action-section">
        <p class="section-label">✅ 해야 할 일</p>`;
      data.action_items.forEach(a => {
        html += `<div class="action-row">
          <span class="action-task">• ${a.task}</span>
          ${a.owner ? `<span class="action-owner">👤 ${a.owner}</span>` : ''}
          ${a.due ? `<span class="action-due">📅 ${a.due}</span>` : ''}
        </div>`;
      });
      html += `</div>`;
    }

    if (data.next_steps) {
      html += `<div class="action-section">
        <p class="section-label">🔜 후속 조치</p>
        <p class="summary-text">${data.next_steps}</p>
      </div>`;
    }

    body.innerHTML = html;
    document.getElementById('output').style.display = 'block';
    document.getElementById('reset-btn').style.display = 'inline-flex';
    document.getElementById('summarize-btn').disabled = false;
  }

  function reset() {
    document.getElementById('raw-minutes').value = '';
    document.getElementById('meeting-title').value = '';
    document.getElementById('meeting-attendees').value = '';
    document.getElementById('output').style.display = 'none';
    document.getElementById('reset-btn').style.display = 'none';
    document.getElementById('header-info').style.display = 'flex';
  }

  function copyResult() {
    const card = document.getElementById('result-card');
    const text = card.innerText.replace(/⎘ 전체 복사/g, '').trim();
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '✓ 복사됨';
      setTimeout(() => { btn.textContent = '⎘ 전체 복사'; }, 1500);
    });
  }
</script>
</body>
</html>
